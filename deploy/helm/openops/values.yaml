global:
  version: "latest"

image:
  repository: public.ecr.aws/openops
  pullPolicy: IfNotPresent

openopsEnvironmentVariables:
  OPS_PUBLIC_URL: ""
  OPS_ENVIRONMENT: "prod"
  OPS_ENVIRONMENT_NAME: "helm"
  OPS_TRIGGER_DEFAULT_POLL_INTERVAL: 1
  OPS_WEBHOOK_TIMEOUT_SECONDS: 30
  OPS_BLOCKS_SOURCE: 'FILE'
  OPS_BLOCKS_SYNC_MODE: NONE
  OPS_NGINX_CONFIG_FILE: nginx.gateway.conf

  # Authentication
  OPS_API_KEY: "api-key"
  OPS_ENCRYPTION_KEY: abcdef123456789abcdef123456789ab
  OPS_JWT_SECRET: please-change-this-secret
  OPS_OPENOPS_ADMIN_EMAIL: admin@openops.com
  OPS_OPENOPS_ADMIN_PASSWORD: please-change-this-password-1

  # Telemetry
  OPS_LOG_LEVEL: info
  OPS_LOG_PRETTY: false
  OPS_TELEMETRY_COLLECTOR_URL: https://telemetry.openops.com/save

  # Engine
  OPS_ENGINE_URL: http://openops-engine:3005/execute
  OPS_EXECUTION_MODE: SANDBOX_CODE_ONLY

  # Queue
  OPS_QUEUE_MODE: REDIS

  # Database
  OPS_DB_TYPE: POSTGRES

  # Tables
  OPS_OPENOPS_TABLES_DATABASE_NAME: tables
  OPS_OPENOPS_TABLES_API_URL: http://openops-tables
  OPS_OPENOPS_TABLES_PUBLIC_URL: ${OPS_PUBLIC_URL}
  OPS_TABLES_TOKEN_LIFETIME_MINUTES: 60
  OPS_JWT_TOKEN_LIFETIME_HOURS: 168
  OPS_MAX_CONCURRENT_TABLES_REQUESTS: 100

  # Analytics
  OPS_ANALYTICS_PUBLIC_URL: ${OPS_PUBLIC_URL}
  OPS_ANALYTICS_PRIVATE_URL: http://openops-analytics:8088
  OPS_ANALYTICS_ADMIN_PASSWORD: please-change-this-password-1
  ANALYTICS_POWERUSER_PASSWORD: please-change-this-password-1
  ANALYTICS_ALLOW_ADHOC_SUBQUERY: true

  # AWS
  OPS_AWS_ENABLE_IMPLICIT_ROLE:

  # Blocks custom settings
  OPS_CODE_BLOCK_MEMORY_LIMIT_IN_MB: 256
  OPS_SLACK_APP_SIGNING_SECRET:
  OPS_SLACK_ENABLE_INTERACTIONS: true


app:
  name: openops-app
  image: openops-app
  replicas: 1

engine:
  name: openops-engine
  image: openops-engine
  replicas: 1

tables:
  name: openops-tables
  image: openops-tables
  tag: "0.2.6"
  replicas: 1
  env:
    privateUrl: ""  # Auto-configured from tables service
    extraAllowedHosts: "*"
    syncTemplatesOnStartup: "false"
    migrateOnStartup: "true"
    disableVolumeCheck: "yes"
    redisUrl: ""  # Auto-configured from redis service
  storage:
    size: 10Gi
    storageClass: ""

analytics:
  name: openops-analytics
  image: openops-analytics
  tag: "0.14.1"
  replicas: 1
  env:
    gunicornLogLevel: "debug"
    databaseDialect: "postgresql"
    databaseDb: "analytics"
    databaseHost: ""  # Auto-configured from postgres service
    databasePort: ""  # Auto-configured from postgres service
    featureAllowAdhocSubquery: "true"

postgres:
  name: postgres
  image: postgres
  tag: "14.4"
  replicas: 1
  env:
    maxConnections: "300"
  storage:
    size: 20Gi
    storageClass: ""
  service:
    port: 5432

redis:
  name: redis
  image: redis
  tag: "7.4.0"
  replicas: 1
  storage:
    size: 5Gi
    storageClass: ""
  service:
    port: 6379

nginx:
  name: nginx
  image: nginx
  tag: "1.27.4"
  replicas: 1
  service:
    port: 80
    type: LoadBalancer

secrets:
  encryptionKey: ""
  jwtSecret: ""
  adminEmail: ""
  adminPassword: ""
  analyticsAdminPassword: ""
  analyticsPoweruserPassword: ""
  postgresUsername: ""
  postgresPassword: ""
  postgresDatabase: ""
  tablesPublicUrl: ""
  tablesDbHost: ""
  jwtTokenLifetimeHours: "24"
  tablesTokenLifetimeMinutes: "60"
  tablesDatabaseName: ""
  postgresHost: ""
  postgresPort: "5432"
  apiKey: ""
  slackAppSigningSecret: "placeholder"

volumes:
  azureConfigDir: ""
  cloudsdkConfig: ""
