catalog: tables
schema: public
sql: "WITH opp AS (\n        SELECT\n          \"Account\" AS opp_account,\n     \
  \     COALESCE(SUM(\"Estimated savings USD per month\"), 0) AS opp_sum\n       \
  \ FROM public.\"Opportunities_5_userfriendly\"\n        WHERE \"Workflow\" LIKE\
  \ 'Azure Benchmark%'\n        GROUP BY \"Account\"\n      ),\n      ts AS (\n  \
  \      SELECT\n          \"Account\" AS ts_account,\n          COALESCE(SUM(\"Value\"\
  ), 0) AS ts_value\n        FROM public.\"Timeseries_10_userfriendly\"\n        WHERE\
  \ \"Workflow\" = 'Run Azure Benchmark'\n          AND \"Date\" = (date_trunc('month',\
  \ current_date) - interval '1 month')::date\n        GROUP BY \"Account\"\n    \
  \  )\n      SELECT\n        COALESCE(opp.opp_account, ts.ts_account) AS \"Account\"\
  ,\n        COALESCE(opp.opp_sum, 0) AS savings,\n        COALESCE(ts.ts_value, 0)\
  \ AS monthly_cost,\n        CASE\n          WHEN COALESCE(ts.ts_value, 0) = 0 THEN\
  \ 100.0\n          ELSE (1 - (COALESCE(opp.opp_sum, 0) / COALESCE(ts.ts_value, 0)))\
  \ * 100.0\n        END AS kpi\n      FROM opp\n      FULL OUTER JOIN ts\n      \
  \  ON opp.opp_account = ts.ts_account;"
